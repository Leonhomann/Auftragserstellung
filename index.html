<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zimmerei-Angebot Formular</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
padding:20px;
}

.container{
max-width:900px;
margin:0 auto;
background:white;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
padding:40px 30px;
text-align:center;
}

.header h1{font-size:28px;margin-bottom:10px}

.form-content{padding:40px 30px}

.form-section{margin-bottom:35px}

.section-title{
font-size:16px;
font-weight:600;
margin-bottom:20px;
padding-bottom:10px;
border-bottom:2px solid #667eea;
}

.form-group{margin-bottom:20px}

label{display:block;margin-bottom:8px;font-size:14px}

input,textarea,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
background:#f9f9f9;
}

textarea{min-height:100px}

.form-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

@media(max-width:600px){
.form-row{grid-template-columns:1fr}
}

.checkbox-group{display:flex;flex-direction:column;gap:12px}

.checkbox-item{display:flex;align-items:center}

button{
padding:14px 40px;
border:none;
border-radius:6px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

.btn-submit{
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
color:white;
}

.btn-reset{background:#ecf0f1}

.button-group{
margin-top:40px;
display:flex;
gap:15px;
justify-content:center;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>🏗️ Angebots-Erfassungsformular</h1>
<p>Interne Erfassung nach Vor-Ort-Gespräch</p>
</div>

<div class="form-content">

<form id="quotationForm"
action="https://leonhomann.app.n8n.cloud/webhook/Angebot"
method="POST">

<input type="hidden" name="timestamp" id="timestampField">

<div class="form-section">
<div class="section-title">👤 Kundendaten</div>

<div class="form-row">
<div class="form-group">
<label>Vorname</label>
<input type="text" name="firstName">
</div>

<div class="form-group">
<label>Nachname</label>
<input type="text" name="lastName">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>E-Mail</label>
<input type="email" name="email">
</div>

<div class="form-group">
<label>Telefon</label>
<input type="tel" name="phone">
</div>
</div>

<div class="form-group">
<label>Adresse</label>
<input type="text" name="address">
</div>
</div>

<div class="form-section">
<div class="section-title">🔨 Projektdetails</div>

<div class="form-row">

<div class="form-group">
<label>Projektart</label>
<select name="projectType">

<option value="">Bitte wählen</option>
<option value="Carport">Carport</option>
<option value="Terrasse">Terrasse</option>
<option value="Dachsanierung">Dachsanierung</option>
<option value="Innenausbau">Innenausbau</option>

</select>
</div>

<div class="form-group">
<label>Fläche m²</label>
<input type="number" name="projectSize">
</div>

</div>

<div class="form-row">

<div class="form-group">
<label>Zeitrahmen</label>
<select name="timeline">
<option>Sofort</option>
<option>1-2 Monate</option>
<option>3-6 Monate</option>
</select>
</div>

<div class="form-group">
<label>Budget</label>
<input type="number" name="estimatedBudget">
</div>

</div>

<div class="form-group">
<label>Projektbeschreibung</label>
<textarea name="projectDescription"></textarea>
</div>

</div>

<div class="button-group">
<button type="reset" class="btn-reset">Zurücksetzen</button>
<button type="submit" class="btn-submit">Angebot anfordern</button>
</div>

</form>

</div>
</div>

<script>

const form=document.getElementById("quotationForm")

form.addEventListener("submit",function(){
document.getElementById("timestampField").value=new Date().toISOString()
})

</script>

</body>
</html>
